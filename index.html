<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A2B4A">
  <title>2026 청소년 구강건강 챌린지 (챌린지)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg-top: #2D4A7A;
      --bg-bottom: #1A2B4A;
      --primary-dark: #2558CC;
      --accent: #FFD166;
      --text-muted: #A8B8D0;
      --text-on-dark: #E8EEF8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text-on-dark);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding:
        max(4px, calc(2px + var(--safe-top)))
        6px
        max(4px, calc(2px + var(--safe-bottom)));
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 4px 1ch;
      padding: 0 4px 2px;
      flex-shrink: 0;
    }

    .header__title {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--bg-bottom);
      background: linear-gradient(135deg, var(--accent) 0%, #FFC233 100%);
      padding: 2px 7px;
      border-radius: 5px;
      line-height: 1.3;
      width: fit-content;
      flex-shrink: 0;
      max-width: 100%;
      text-align: center;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.12);
      letter-spacing: -0.02em;
      word-break: keep-all;
    }

    .header__center {
      font-size: calc(0.78rem + 5pt);
      font-weight: 500;
      color: var(--text-on-dark);
      line-height: 1.35;
      text-align: center;
      word-break: keep-all;
    }

    .header__brand {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 1;
      max-width: 100%;
    }

    @media (max-width: 400px) {
      .header {
        flex-direction: column;
        gap: 4px;
      }
    }

    .tag-line {
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      font-size: calc(0.95rem + 2pt);
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: -0.02em;
      line-height: 1.2;
      text-align: center;
      padding: 2px 4px 4px;
      flex-shrink: 0;
    }

    .tag-line strong {
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-size: 1.12em;
    }

    .tag-line.is-blinking {
      animation: tag-blink 1s ease-in-out 5;
    }

    @keyframes tag-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .image-stage {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-stage__skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.04) 25%,
        rgba(255, 255, 255, 0.1) 50%,
        rgba(255, 255, 255, 0.04) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .image-stage__img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .image-stage__img.is-loaded {
      opacity: 1;
    }

    .image-stage__img.is-loaded + .image-stage__skeleton {
      display: none;
    }

    .ai-notice {
      font-size: 8pt;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.2;
      padding: 3px 4px 0;
      flex-shrink: 0;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__title">2026 청소년 구강건강 챌린지</div>
      <div class="header__brand">
        <span class="header__center" id="center-name">🦷 미추홀구 보건소와 함께해요!✨</span>
      </div>
    </header>

    <p class="tag-line" id="tag-stats">
      지금까지 <strong><span id="tag-count">-</span>번</strong> 태그했어요 💪
    </p>

    <div class="image-stage">
      <img
        class="image-stage__img"
        id="hero-image"
        src=""
        alt="구강건강 챌린지 이미지"
      >
      <div class="image-stage__skeleton" id="skeleton"></div>
    </div>

    <p class="ai-notice">본 이미지는 AI를 활용하여 제작되었습니다</p>
  </div>

  <script>
    const CONFIG = {
      healthCenterName: "🦷 미추홀구 보건소와 함께해요!✨",
      appsScriptUrl: "https://script.google.com/macros/s/AKfycbyOPAiJvX4IMeMXYCVl7-93RVZfJftmbo4x50pmI0wRlr9ySTWk3V6907UJsitW3_olEQ/exec",
      images: [
        { id: "01", src: "images/01.jpg", weight: 3, alt: "그냥 다 귀찮음" },
        { id: "02", src: "images/02.jpg", weight: 3, alt: "충치는 연락 없이 옴" },
        { id: "03", src: "images/03.jpg", weight: 3, alt: "칫솔은 아직 자는 중" },
        { id: "04", src: "images/04.jpg", weight: 3, alt: "웃다가 점심시간 끝남" },
        { id: "05", src: "images/05.jpg", weight: 3, alt: "나중에 할게요" },
        { id: "06", src: "images/06.jpg", weight: 3, alt: "점심시간 통장" },
        { id: "07", src: "images/07.jpg", weight: 3, alt: "오늘만 안 해야지" },
        { id: "08", src: "images/08.jpg", weight: 3, alt: "하고 싶은 거 하는 시간" },
        { id: "09", src: "images/09.jpg", weight: 3, alt: "오늘의 치아 날씨" },
        { id: "10", src: "images/10.jpg", weight: 3, alt: "아무 것도 안 해도 재밌음" },
        { id: "11", src: "images/11.jpg", weight: 3, alt: "오늘의 퀘스트" },
        { id: "12", src: "images/12.jpg", weight: 3, alt: "건강 점검 결과" },
        { id: "13", src: "images/13.jpg", weight: 3, alt: "놀거리는 많음" },
        { id: "14", src: "images/14.jpg", weight: 3, alt: "원래 하는 거라서" },
        { id: "15", src: "images/15.jpg", weight: 3, alt: "칫솔 못 찾겠다" },
        { id: "16", src: "images/16.jpg", weight: 3, alt: "아플 땐 양치 생각남" },
        { id: "17", src: "images/17.jpg", weight: 3, alt: "자연스럽게 다음 순서" },
        { id: "18", src: "images/18.jpg", weight: 3, alt: "하다 보니 함" },
        { id: "19", src: "images/19.jpg", weight: 1, alt: "10명 중 2명" },
        { id: "20", src: "images/20.jpg", weight: 1, alt: "인천 전국 16위" }
      ]
    };

    const STORAGE_KEY = "health_challenge_tag_count";

    function normalizeId(id) {
      const text = String(id).trim();
      if (/^\d+$/.test(text) && text.length < 2) {
        return text.padStart(2, "0");
      }
      return text;
    }

    function pickWeightedImage(images) {
      const total = images.reduce((sum, img) => sum + img.weight, 0);
      let random = Math.random() * total;

      for (const image of images) {
        random -= image.weight;
        if (random <= 0) return image;
      }

      return images[images.length - 1];
    }

    function incrementPersonalCount() {
      const count = Number(localStorage.getItem(STORAGE_KEY) || 0) + 1;
      localStorage.setItem(STORAGE_KEY, String(count));
      return count;
    }

    function blinkTagCount() {
      const el = document.getElementById("tag-stats");
      el.classList.add("is-blinking");
      setTimeout(function () {
        el.classList.remove("is-blinking");
      }, 5000);
    }

    function showImage(image) {
      const img = document.getElementById("hero-image");
      img.alt = image.alt;

      img.onload = function () {
        img.classList.add("is-loaded");
      };

      img.onerror = function () {
        img.classList.add("is-loaded");
        document.getElementById("skeleton").style.display = "none";
        img.alt = "이미지를 불러올 수 없습니다. html과 images 폴더를 함께 보내주세요.";
      };

      img.src = image.src;
    }

    function renderPage(data) {
      const centerName = data.healthCenterName || CONFIG.healthCenterName;
      document.getElementById("center-name").textContent = centerName;
      document.getElementById("tag-count").textContent = data.count;
      blinkTagCount();
      showImage(data.image);
    }

    function fetchFromServer() {
      return new Promise(function (resolve, reject) {
        const callbackName = "hc_" + Date.now();
        let script;

        const timeout = setTimeout(function () {
          cleanup();
          reject(new Error("서버 응답 시간 초과"));
        }, 15000);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = function (data) {
          cleanup();
          resolve(data);
        };

        script = document.createElement("script");
        script.src = CONFIG.appsScriptUrl + "?callback=" + callbackName + "&t=" + Date.now();
        script.onerror = function () {
          cleanup();
          reject(new Error("스크립트 연결 실패"));
        };
        document.head.appendChild(script);
      });
    }

    function runDemoMode() {
      const count = incrementPersonalCount();
      const image = pickWeightedImage(CONFIG.images);

      return {
        count: count,
        image: image
      };
    }

    async function init() {
      document.getElementById("center-name").textContent = CONFIG.healthCenterName;

      try {
        let data;

        if (CONFIG.appsScriptUrl) {
          data = await fetchFromServer();
          if (data.error) throw new Error(data.message || "서버 오류");
          const image = CONFIG.images.find(function (img) {
            return normalizeId(img.id) === normalizeId(data.imageId);
          }) || pickWeightedImage(CONFIG.images);
          data.image = image;
          data.count = incrementPersonalCount();
        } else {
          data = runDemoMode();
        }

        renderPage(data);
      } catch (error) {
        console.error(error);
        const data = runDemoMode();
        renderPage(data);
      }
    }

    init();
  </script>
</body>
</html>
